name: release-please

# Watches main, reads conventional commits, and keeps a standing "Release PR" that
# bumps the version + regenerates CHANGELOG.md. Merging that PR creates the tag +
# GitHub release, which triggers release.yml to build + GPG-sign + publish binaries.
on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # IMPORTANT: use a PAT (secret RELEASE_PLEASE_TOKEN, contents+PR write) so
          # the tag/release this creates TRIGGERS release.yml. The default
          # GITHUB_TOKEN cannot trigger other workflows, so with the fallback the
          # release PR + tag are still created, but release.yml won't auto-build —
          # you'd re-push the tag (or run release.yml) manually. See task notes.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
