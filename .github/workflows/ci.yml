name: CI

on:
  push:
    branches: [ main ]   # post-merge sanity on main
  pull_request:          # every PR (incl. dev branches + Dependabot) gets CI — the gate
  workflow_dispatch:     # manual re-run for a flaky check

# Cancel superseded runs for the same PR/ref so new commits don't pile up runs.
# Keyed on the PR head SHA when available so a branch push and its PR don't both run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.26.5']

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go }}
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

    - name: Check formatting
      if: matrix.os != 'windows-latest'
      run: |
        gofmt -l .
        test -z "$(gofmt -l .)"

    - name: Run tests
      shell: bash
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic $(go list ./... | grep -v '/test/')

    - name: Check coverage threshold
      if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26.5'
      run: |
        coverage=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: ${coverage}%"
        if (( $(echo "$coverage < 5" | bc -l) )); then
          echo "❌ Coverage ${coverage}% is below 5% threshold"
          exit 1
        fi
        echo "✅ Coverage ${coverage}% meets 5% threshold"

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26.5'
      uses: codecov/codecov-action@v7
      with:
        files: ./coverage.txt
        flags: unittests
        name: codecov-umbrella

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.5'
        cache: true

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        install-mode: goinstall
        args: --timeout=5m

  docker-test:
    name: Docker Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Enforce single Docker setup
      run: |
        # Only Dockerfile (root), docker-compose.yml (root), and test/mock-server/Dockerfile are allowed
        EXTRA_DOCKERFILES=$(find . -name 'Dockerfile*' -o -name 'docker-compose*' | grep -v './Dockerfile$' | grep -v './docker-compose.yml$' | grep -v './test/mock-server/Dockerfile$' | sort)
        if [ -n "$EXTRA_DOCKERFILES" ]; then
          echo "ERROR: Only one Docker setup allowed. Found extra files:"
          echo "$EXTRA_DOCKERFILES"
          echo "Remove these or rename to use the canonical Dockerfile and docker-compose.yml"
          exit 1
        fi
        echo "Docker file check passed"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build mock API server
      run: docker build -t celeste-cli-mock-api -f test/mock-server/Dockerfile test/mock-server

    - name: Run Docker tests
      run: |
        docker compose up --build --abort-on-container-exit --exit-code-from test-runner

    - name: View test logs
      if: always()
      run: |
        if [ -d "test/reports" ]; then
          echo "=== Test Reports ==="
          cat test/reports/*.log || true
          echo "=== Test Summary ==="
          cat test/reports/summary.json || true
        fi

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: docker-test-reports
        path: test/reports/
        retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0  # Fetch all history for gitleaks

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.5'
        cache: true

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run govulncheck
      run: |
        # Pinned: govulncheck v1.4.0 (current @latest) panics with
        # "ForEachElement called on type containing *types.TypeParam" on dep
        # graphs that use Go generics (e.g. anthropic-sdk-go's ordered-map/v2).
        # v1.1.4 is the last release before that regression and scans the same
        # vuln DB. Revisit / move back to @latest once the panic is fixed upstream.
        go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
        govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint, docker-test]

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.5'
        cache: true

    - name: Build for multiple platforms
      run: |
        LDFLAGS="-X main.Version=ci-${{ github.sha }} -X main.CommitSHA=${{ github.sha }}"
        GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/celeste-linux-amd64 ./cmd/celeste
        GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/celeste-darwin-amd64 ./cmd/celeste
        GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/celeste-darwin-arm64 ./cmd/celeste
        GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/celeste-windows-amd64.exe ./cmd/celeste

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: binaries
        path: dist/
        retention-days: 7
